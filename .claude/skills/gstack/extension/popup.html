<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      width: 240px;
      background: #0C0C0C;
      color: #e0e0e0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      font-size: 13px;
      padding: 16px;
    }
    h1 {
      font-size: 16px;
      font-weight: 700;
      color: #FAFAFA;
      margin-bottom: 16px;
      letter-spacing: -0.3px;
    }
    label {
      display: block;
      font-size: 12px;
      color: #A1A1AA;
      margin-bottom: 4px;
    }
    input {
      width: 100%;
      padding: 8px;
      background: #141414;
      border: 1px solid #262626;
      border-radius: 8px;
      color: #FAFAFA;
      font-family: 'JetBrains Mono', 'SF Mono', 'Fira Code', monospace;
      font-size: 13px;
      outline: none;
      transition: border-color 150ms;
    }
    input:focus { border-color: #F59E0B; }
    .status {
      margin: 12px 0;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3f3f46;
      flex-shrink: 0;
    }
    .dot.connected { background: #22C55E; }
    .dot.error { background: #EF4444; }
    .dot.reconnecting {
      background: #F59E0B;
      animation: pulse 2s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 0.4; }
      50% { opacity: 1; }
    }
    .status-text { color: #A1A1AA; font-size: 12px; }
    .status-text.connected { color: #22C55E; }
    .details { color: #52525B; font-size: 11px; margin-top: 2px; }
    button {
      width: 100%;
      margin-top: 12px;
      padding: 8px;
      background: rgba(245, 158, 11, 0.1);
      border: 1px solid #F59E0B;
      border-radius: 8px;
      color: #FBBF24;
      font-size: 13px;
      cursor: pointer;
      transition: all 150ms;
    }
    button:hover { background: rgba(245, 158, 11, 0.2); }
  </style>
</head>
<body>
  <h1>gstack</h1>

  <label>Port</label>
  <input type="text" id="port" placeholder="34567" autocomplete="off">

  <div class="status">
    <div class="dot" id="dot"></div>
    <span class="status-text" id="status-text">Disconnected</span>
  </div>
  <div class="details" id="details"></div>

  <button id="side-panel-btn">Open Side Panel</button>

  <script src="popup.js"></script>
</body>
</html>
